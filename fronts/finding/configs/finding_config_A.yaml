# Front Finding Configuration - A
# This configuration file defines parameters for ocean front detection
# This is our first try

# Required fields
label: "A"                      # Config label - will be part of the output filename
window: 64                      # Size of the region for thresholding (pixels)
threshold: 90                   # Threshold for front finding
thresh_mode: "pool"              # Mode for finding threshold [generic, vectorized, dask, pool]
thin: true                      # Apply morphological thinning to fronts

# Optional fields
dilate: false                   # Dilate the front (usually after thin + crop)
min_size: 7                     # Minimum size for front (pixels) - used for cropping
connectivity: 2                 # Connectivity for morphological operations (1=4-conn, 2=8-conn)
