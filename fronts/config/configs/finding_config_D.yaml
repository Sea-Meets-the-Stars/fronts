# Front Finding Configuration - D
# This configuration file defines parameters for ocean front detection
# Modifying threshold

label: "D"                      # Config label - will be part of the output filename

# Binary parameters
binary:
  # Required
  window: 64                      # Size of the region for thresholding (pixels)
  threshold: 85                   # Threshold for front finding
  thresh_mode: "pool"             # Mode for finding threshold [generic, vectorized, dask, pool]
  thin: false                     # Apply morphological thinning to fronts
  sharpen: true                   # Apply morphological thinning to fronts
  despur: true                    # Remove spurs
  Lspur: 10                       # Maximum spur length

  # Optional fields
  dilate: false                   # Dilate the front (usually after thin + crop)
  min_size: 7                     # Minimum size for front (pixels) - used for cropping
  connectivity: 2                 # Connectivity for morphological operations (1=4-conn, 2=8-conn)

# Calculating properties at the fronts
colocate:
  stats: ['mean', 'std', 'median']  # Statistics to compute per property
  percentiles: [10, 90]             # Percentiles to compute per property
  min_npix: 5                        # Minimum front size in pixels
  nan_policy: 'omit'                 # How to handle NaN values (e.g. land pixels)
  dilation_radius: 1                 # Pixels to dilate each front before stats